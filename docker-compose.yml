version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_DEBUG: "0"
      OLLAMA_KEEP_ALIVE: "-1"
      OLLAMA_NUM_PARALLEL: "2"
    cpuset: "0-11"

  rag:
    build: .
    volumes:
      - .:/app
    environment:
      CHROMA_PATH: /app/chroma_ddr
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4}
      OLLAMA_URL: http://ollama:11434
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
    stdin_open: true
    tty: true
    command: bash -lc "stty erase '^?' 2>/dev/null || stty erase '^H'; python rag_answer.py"
    depends_on:
      - ollama
    cpuset: "12-15"

volumes:
  ollama_data: {}
